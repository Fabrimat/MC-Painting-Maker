    <noscript>
      <header style="max-width:720px;margin:0 auto;padding:64px 24px;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;line-height:1.6;color:#1f2937;">
        <h1 style="font-size:32px;margin:0 0 8px;letter-spacing:-0.02em;">MC Painting Maker</h1>
        <p style="color:#6b7280;font-size:17px;margin-top:0;">
          Browser-based tool that turns any image into a custom Minecraft Bedrock painting and exports a ready-to-install <code>.mcaddon</code> add-on. Compatible with Bedrock Edition 1.21.30+ and Minecraft Education Edition.
        </p>
        <h2 style="font-size:20px;margin:32px 0 12px;">JavaScript is required</h2>
        <p>This application runs entirely in your browser. Please enable JavaScript to use it.</p>
        <h2 style="font-size:20px;margin:32px 0 12px;">What you can do</h2>
        <ul>
          <li>Drop images, choose painting dimensions in Minecraft blocks.</li>
          <li>Crop, resize and reposition each image inside its canvas.</li>
          <li>Configure pack metadata: name, namespace, version, icon, creative group.</li>
          <li>Export one <code>.mcaddon</code> file with both behavior and resource packs.</li>
          <li>Use a generated spawn egg in-game to place each custom painting.</li>
        </ul>
        <h2 style="font-size:20px;margin:32px 0 12px;">Privacy-first</h2>
        <p>No upload, no account, no tracking. Everything stays in your browser. See the <a href="./privacy.html" style="color:#f97316;">privacy policy</a>.</p>
        <p>Source code on <a href="https://github.com/Fabrimat/MC-Painting-Maker" rel="noopener noreferrer" style="color:#f97316;">GitHub</a>.</p>
      </header>
